<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure PDF Viewer | Skillox</title>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            background-color: #1a1a1a; 
            text-align: center; 
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: rgba(30, 30, 30, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1001;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .page-jump {
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
            font-size: 0.95rem;
            font-weight: 500;
        }
        .page-jump input {
            width: 60px;
            padding: 6px 10px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.3);
            color: white;
            border-radius: 6px;
            text-align: center;
            font-size: 0.95rem;
            outline: none;
        }
        .page-jump input:focus {
            border-color: #f59e0b;
        }
        .page-jump button {
            background: #f59e0b; 
            border: none; 
            color: white; 
            padding: 6px 16px; 
            border-radius: 20px; 
            cursor: pointer; 
            font-weight: 600; 
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }
        .page-jump button:hover {
            background: #d97706; 
            transform: translateY(-2px);
        }
        #pdf-container { 
            position: relative; 
            display: flex; 
            flex-direction: column;
            align-items: center;
            margin-top: 80px; 
            margin-bottom: 20px; 
        }
        canvas { 
            display: block; 
            margin: 0 auto 20px auto; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); 
            border-radius: 4px;
            max-width: 95vw;
            height: auto;
        }
        .watermark { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100vw; 
            height: 100vh; 
            pointer-events: none; 
            z-index: 999; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            user-select: none; 
        }
        .watermark-content {
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            opacity: 0.15; 
            color: #000; 
            font-size: 5vw; 
            font-weight: bold; 
            transform: rotate(-45deg); 
            text-shadow: 1px 1px 0 #fff, -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff;
        }
        .watermark-sub {
            font-size: 1.5vw;
            margin-top: -2px;
            font-weight: 500;
        }
        .page-indicator {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(30, 30, 30, 0.9);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 500;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.1);
            display: none;
        }
        .loader { 
            color: white; 
            margin-top: 30vh; 
        }
        .close-btn {
            position: absolute;
            top: 10px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .close-btn:hover {
            background: rgba(244, 63, 94, 0.8);
        }
    </style>
</head>
<body oncontextmenu="return false;">
    <div class="top-bar" id="top-bar" style="display: none;">
        <div class="page-jump">
            <span>Jump to Page:</span>
            <input type="number" id="page-input" min="1" placeholder="1">
            <span id="total-pages">/ ?</span>
            <button id="jump-btn">Go</button>
        </div>
        <button class="close-btn" onclick="window.close()" title="Close Viewer">×</button>
    </div>

    <div class="page-indicator" id="page-indicator">Page 1 / ?</div>
    <div id="loader" class="loader"><h2>Loading Document...</h2></div>
    
    <div class="watermark">
        <div class="watermark-content">
            <div>SKILLOX</div>
            <div class="watermark-sub" id="watermark-email"></div>
        </div>
    </div>
    <div id="pdf-container">
        <!-- Canvases will be injected here -->
    </div>

    <!-- PDF.js library via CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        // Security: Prevent saving, printing, and inspecting
        document.addEventListener('keydown', function(e) {
            // Prevent Ctrl+S, Ctrl+P, Ctrl+U, F12
            if (e.ctrlKey && ['s', 'p', 'u'].includes(e.key.toLowerCase())) {
                e.preventDefault();
                alert('Downloading and printing are disabled for premium content.');
            }
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I')) {
                e.preventDefault();
            }
        });

        // Setup PDF.js worker
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        // Get user email for watermark
        const userEmail = localStorage.getItem('skillox_auth_email') || 'Guest';
        document.getElementById('watermark-email').textContent = userEmail;

        // Get file from URL
        const urlParams = new URLSearchParams(window.location.search);
        const file = urlParams.get('file');

        if (!file) {
            document.getElementById('loader').innerHTML = '<h2>Error: No file specified.</h2><p>Please select a document from the main website.</p>';
        } else {
            // Responsive scale based on screen width
            const scale = window.innerWidth < 768 ? 1.0 : 1.5;
            const container = document.getElementById('pdf-container');

            // Store canvases for page jump
            const canvases = [];

            // Load the document
            pdfjsLib.getDocument(file).promise.then(async pdfDoc => {
                document.getElementById('loader').style.display = 'none';
                
                // Show top bar and set total pages
                document.getElementById('top-bar').style.display = 'flex';
                document.getElementById('total-pages').textContent = '/ ' + pdfDoc.numPages;
                document.getElementById('page-input').max = pdfDoc.numPages;
                
                // Setup page indicator
                const pageIndicator = document.getElementById('page-indicator');
                pageIndicator.style.display = 'block';
                pageIndicator.textContent = 'Page 1 / ' + pdfDoc.numPages;
                
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            const pageId = entry.target.id.replace('page-', '');
                            pageIndicator.textContent = `Page ${pageId} / ${pdfDoc.numPages}`;
                            document.getElementById('page-input').placeholder = pageId;
                        }
                    });
                }, {
                    root: null,
                    rootMargin: '-50% 0px -50% 0px', 
                    threshold: 0
                });

                // Page jump functionality
                const jumpBtn = document.getElementById('jump-btn');
                const pageInput = document.getElementById('page-input');
                
                const jumpToPage = () => {
                    let num = parseInt(pageInput.value);
                    if (num >= 1 && num <= pdfDoc.numPages) {
                        if (canvases[num - 1]) {
                            // Scroll to the canvas, accounting for the 60px top bar + 20px padding
                            const y = canvases[num - 1].getBoundingClientRect().top + window.scrollY - 80;
                            window.scrollTo({ top: y, behavior: 'smooth' });
                        }
                    } else {
                        alert('Please enter a valid page number between 1 and ' + pdfDoc.numPages);
                    }
                };
                
                jumpBtn.addEventListener('click', jumpToPage);
                pageInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') jumpToPage();
                });
                
                // Render all pages sequentially
                for (let pageNum = 1; pageNum <= pdfDoc.numPages; pageNum++) {
                    const canvas = document.createElement('canvas');
                    canvas.id = 'page-' + pageNum;
                    canvases.push(canvas);
                    container.appendChild(canvas);
                    observer.observe(canvas);
                    
                    const page = await pdfDoc.getPage(pageNum);
                    const viewport = page.getViewport({ scale });
                    
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;
                    
                    const renderCtx = {
                        canvasContext: canvas.getContext('2d'),
                        viewport: viewport
                    };
                    
                    await page.render(renderCtx).promise;
                }
            }).catch(err => {
                document.getElementById('loader').innerHTML = '<h2>Error loading document.</h2><p>Make sure the file exists and you have internet connection.</p>';
                console.error(err);
            });
        }
    </script>
</body>
</html>
