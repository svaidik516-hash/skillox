<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Skillox</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <a href="index.html" class="logo">
                    <h2>Skillox</h2>
                </a>
                <p id="forgot-subtitle">Reset your password to regain access.</p>
            </div>

            <!-- Step 1: Request OTP -->
            <div class="auth-step active" id="step-forgot-request">
                <form id="forgot-request-form">
                    <div class="form-group">
                        <label for="forgot-email">Email Address</label>
                        <input type="email" id="forgot-email" class="form-control" placeholder="you@example.com" required>
                    </div>
                    <button type="submit" id="forgot-request-btn" class="btn btn-primary btn-block" style="margin-top: 25px;">Send Reset Code</button>
                </form>
                <p style="text-align: center; margin-top: 25px; color: var(--text-muted); font-size: 0.9rem;">
                    Remember your password? <a href="login.html" style="color: var(--primary); font-weight: 500;">Log in</a>
                </p>
            </div>

            <!-- Step 2: Verify & Reset -->
            <div class="auth-step hidden" id="step-forgot-reset">
                <p style="text-align: center; color: var(--text-muted); margin-bottom: 25px; font-size: 0.95rem;">
                    Enter the 6-digit code sent to your email and choose a new password.
                </p>
                <form id="forgot-reset-form">
                    <div class="otp-container">
                        <input type="text" class="otp-input forgot-otp" maxlength="1" autocomplete="off" required>
                        <input type="text" class="otp-input forgot-otp" maxlength="1" autocomplete="off" required>
                        <input type="text" class="otp-input forgot-otp" maxlength="1" autocomplete="off" required>
                        <input type="text" class="otp-input forgot-otp" maxlength="1" autocomplete="off" required>
                        <input type="text" class="otp-input forgot-otp" maxlength="1" autocomplete="off" required>
                        <input type="text" class="otp-input forgot-otp" maxlength="1" autocomplete="off" required>
                    </div>

                    <div class="form-group" style="margin-top: 20px;">
                        <label for="forgot-new-password">New Password</label>
                        <div class="password-wrapper">
                            <input type="password" id="forgot-new-password" class="form-control" placeholder="••••••••" required>
                            <button type="button" class="btn-eye toggle-password" tabindex="-1">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="eye-open">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="eye-closed" style="display:none;">
                                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                                    <line x1="1" y1="1" x2="23" y2="23"></line>
                                </svg>
                            </button>
                        </div>
                        <div class="password-strength">
                            <div class="strength-bar-container">
                                <div class="strength-bar" id="forgot-strength-bar"></div>
                            </div>
                            <span class="strength-text" id="forgot-strength-text"></span>
                        </div>
                    </div>

                    <div class="form-group" style="margin-top: 15px;">
                        <label for="forgot-confirm-password">Confirm New Password</label>
                        <div class="password-wrapper">
                            <input type="password" id="forgot-confirm-password" class="form-control" placeholder="••••••••" required>
                            <button type="button" class="btn-eye toggle-password" tabindex="-1">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="eye-open">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="eye-closed" style="display:none;">
                                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                                    <line x1="1" y1="1" x2="23" y2="23"></line>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <button type="submit" id="forgot-reset-btn" class="btn btn-primary btn-block" style="margin-top: 25px;" disabled>Reset Password</button>
                    <button type="button" class="btn btn-outline btn-block" id="btn-forgot-back" style="margin-top: 10px;">Back</button>
                </form>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
